# Kafka streaming stack for LedgerLens (STREAMING_BACKEND=kafka).
#
#   docker-compose up --scale ledgerlens-scorer=3
#
# Brings up Zookeeper + Kafka, one producer that ingests Horizon SSE trades into
# per-pair Avro topics, N scorer replicas consuming from the shared consumer
# group "ledgerlens-scorer", and Prometheus + Grafana for lag / latency.
version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  ledgerlens-producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      STREAMING_BACKEND: kafka
      ROLE: producer
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WATCHED_ASSET_PAIRS: ${WATCHED_ASSET_PAIRS:-USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN}
      HORIZON_URL: ${HORIZON_URL:-https://horizon.stellar.org}
    entrypoint: []
    command: ["python", "-m", "scripts.stream", "--backend", "kafka", "--role", "producer"]

  ledgerlens-scorer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      STREAMING_BACKEND: kafka
      ROLE: worker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: ledgerlens-scorer
      KAFKA_METRICS_PORT: 9100
      KAFKA_LAG_ALERT_THRESHOLD: ${KAFKA_LAG_ALERT_THRESHOLD:-500}
    entrypoint: []
    command: ["python", "-m", "scripts.stream", "--backend", "kafka", "--role", "worker"]
    expose:
      - "9100"
    deploy:
      replicas: 3

  prometheus:
    image: prom/prometheus:v2.53.0
    depends_on:
      - ledgerlens-scorer
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
